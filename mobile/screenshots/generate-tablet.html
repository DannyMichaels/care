<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .screenshot {
    width: 2560px;
    height: 1600px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
    display: none;
    flex-direction: row;
    align-items: center;
  }

  .screenshot.active {
    display: flex;
  }

  /* Left text area */
  .left-text {
    width: 560px;
    padding: 60px;
    flex-shrink: 0;
    text-align: center;
  }

  .left-text h1 {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    font-weight: 800;
    color: #FDD835;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .left-text p {
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.4;
  }

  /* Tablet screenshot area */
  .tablet-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 100%;
    padding: 40px 60px 40px 0;
  }

  .tablet-frame {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.08);
  }

  .tablet-frame img {
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /* Callout bubble */
  .callout {
    position: absolute;
    background: #FDD835;
    color: #121212;
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 700;
    padding: 12px 20px;
    border-radius: 12px;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    line-height: 1.3;
    white-space: nowrap;
  }
</style>
</head>
<body>

    <p>Meds, food, symptoms & mood — all in one place</p>
  </div>
